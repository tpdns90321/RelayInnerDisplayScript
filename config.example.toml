# RelayInnerDisplay sample config for Proxmox host direct install.
# Edit vmid and node_name before starting the services for the first time.
[target]
vmid = 100
node_name = "pve"
guest_os = "windows"
console_backend = "spice"

[runtime]
run_dir = "/run/relayinner-display"
control_socket = "/run/relayinner-display/session.sock"
log_namespace = "relayinner-display"

[kiosk]
compositor = "auto"

[console]
artifact_dir = "/run/relayinner-display/console"

[console.spice]
vv_path = "/run/relayinner-display/console/spice-current.vv"

# To use the VNC backend instead, set console_backend = "vnc", prepare the VM with:
# args: -vnc 127.0.0.1:77
#
# [console.vnc]
# bind_host = "127.0.0.1"
# display_number = 77
# viewer = "remote-viewer"

# To use the Looking Glass backend instead, set console_backend = "looking-glass",
# install the client yourself, and prepare GPU passthrough plus KVMFR/IVSHMEM
# outside this installer. See https://looking-glass.io/docs/ for the upstream guide.
#
# [console.looking_glass]
# shm_file = "/dev/kvmfr0"
# binary = "looking-glass-client"
# renderer = "auto"
# fullscreen = true
# disable_host_screensaver = true
# spice_enabled = true

# To use the Moonlight backend instead, set console_backend = "moonlight",
# install Linux moonlight-qt 6.0.0 or newer yourself, and point host at a
# Sunshine guest that you prepared outside this installer. If the host is
# reachable but unpaired, the kiosk shows a PIN for the Sunshine web UI PIN
# page; no extra relay config keys or stored Sunshine credentials are needed.
# The relay launches paired Desktop streams directly from the managed workspace
# state, validates other app names against the live Sunshine app list
# case-insensitively, and reconnects if Moonlight exits unexpectedly while the
# VM remains running. With kiosk.compositor = "auto", Moonlight resolves to
# the sway kiosk path while spice, vnc, and looking-glass keep the cage path.
#
# [console.moonlight]
# binary = "moonlight"
# host = "192.168.50.20"
# base_port = 47989
# app = "Desktop"
# state_dir = "/var/lib/relayinner-display/moonlight"
# quit_app_after_session = false  # valid only for non-Desktop apps

[policy]
poll_interval_ms = 2000
reconnect_initial_ms = 1000
reconnect_max_ms = 15000
command_timeout_s = 10
dpms_policy = "vm-power"
dpms_off_delay_ms = 5000
power_state_stabilize_ms = 3000
power_button_action_when_running = "shutdown"
power_button_action_when_stopped = "start"
shutdown_timeout_s = 90

[display]
output_name = ""
power_helper = "wlr-randr"

[input]
power_button_event = "/dev/input/by-path/platform-i8042-serio-0-event-power"
forward_power_button = true
debounce_ms = 2000
